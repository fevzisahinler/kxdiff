version: 2

project_name: kxdiff

before:
  hooks:
    - go mod tidy

builds:
  - id: kxdiff
    main: ./cmd/kxdiff
    binary: kubectl-kxdiff
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: kxdiff
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

brews:
  - name: kxdiff
    repository:
      owner: fevzisahinler
      name: homebrew-tap
    homepage: "https://github.com/fevzisahinler/kxdiff"
    description: "Read-only diff between two Kubernetes environments"
    license: Apache-2.0
    install: |
      bin.install "kubectl-kxdiff"
      bin.install_symlink "kubectl-kxdiff" => "kxdiff"
    test: |
      system "#{bin}/kxdiff", "--help"

